<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ScanCard</title>
<style>
  :root{
    --ink:#1b1f23;
    --paper:#faf8f4;
    --card:#ffffff;
    --line:#e4ddd1;
    --accent:#c4501c;
    --accent-ink:#ffffff;
    --muted:#7a7367;
    --ok:#2f7a4f;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:-apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    padding-bottom:48px;
  }

  /* --- PIN Overlay --- */
  .pin-overlay{
    display:none;
    position:fixed;
    inset:0;
    background:var(--paper);
    z-index:2000;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:32px 24px;
  }
  .pin-overlay.visible{display:flex;}
  .pin-logo{
    font-size:34px;
    font-weight:750;
    color:var(--accent);
    letter-spacing:-0.03em;
    margin-bottom:6px;
  }
  .pin-tagline{
    font-size:14px;
    color:var(--muted);
    margin:0 0 36px;
    text-align:center;
  }
  .pin-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:20px;
    padding:28px 24px;
    width:100%;
    max-width:360px;
  }
  .pin-card label{
    display:block;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:.08em;
    color:var(--muted);
    font-weight:700;
    margin-bottom:8px;
  }
  .pin-card input[type=password]{
    width:100%;
    border:1px solid var(--line);
    border-radius:12px;
    padding:14px 16px;
    font-size:22px;
    letter-spacing:0.25em;
    text-align:center;
    background:var(--paper);
    color:var(--ink);
    font-family:inherit;
    margin-bottom:14px;
  }
  .pin-card input[type=password]:focus{
    outline:none;
    border-color:var(--accent);
  }
  .pin-error{
    font-size:13px;
    color:#a83210;
    text-align:center;
    margin:0 0 12px;
    min-height:20px;
  }
  .save-pin-row{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:13px;
    color:var(--muted);
    margin-bottom:16px;
  }
  .save-pin-row input[type=checkbox]{
    width:16px;height:16px;
    accent-color:var(--accent);
    flex-shrink:0;
  }

  /* --- Header --- */
  header{
    padding:14px 20px;
    border-bottom:1px solid var(--line);
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .page-logo{
    display:flex;
    justify-content:center;
    padding:32px 0 16px;
  }
  .page-logo img{
    height:52px;
    width:auto;
    opacity:0.75;
  }
  .header-brand{
    font-size:22px;
    font-weight:750;
    color:var(--accent);
    letter-spacing:-0.02em;
    line-height:1;
  }
  .header-sub{
    font-size:11px;
    color:var(--muted);
    margin-top:3px;
    letter-spacing:.01em;
  }
  .lock-btn{
    background:none;
    border:1px solid var(--line);
    border-radius:10px;
    padding:7px 12px;
    font-size:12px;
    color:var(--muted);
    cursor:pointer;
    font-family:inherit;
  }
  .lock-btn:active{background:var(--line);}

  /* --- Main --- */
  main{
    max-width:480px;
    margin:0 auto;
    padding:20px;
  }
  .panel{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:18px;
    padding:20px;
    margin-bottom:16px;
  }
  .capture-zone{
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    gap:14px;
    padding:52px 16px;
    border:1.5px dashed var(--line);
    border-radius:14px;
    cursor:pointer;
    user-select:none;
    -webkit-user-select:none;
  }
  .capture-zone svg{width:48px;height:48px;color:var(--accent);}
  .capture-zone strong{font-size:17px;}
  .capture-zone p{
    margin:0;
    font-size:13px;
    color:var(--muted);
    max-width:30ch;
    line-height:1.5;
  }
  input[type=file]{display:none;}
  .btn{
    appearance:none;
    border:none;
    border-radius:12px;
    padding:14px 22px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    width:100%;
    text-align:center;
    font-family:inherit;
  }
  .btn-primary{background:var(--accent);color:var(--accent-ink);}
  .btn-primary:active{filter:brightness(0.92);}
  .btn-secondary{background:transparent;color:var(--ink);border:1px solid var(--line);}
  .preview-img{
    width:100%;
    border-radius:12px;
    margin-bottom:14px;
    display:block;
    border:1px solid var(--line);
  }
  .status{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:14px;
    color:var(--muted);
    padding:10px 0;
  }
  .spinner{
    width:16px;height:16px;
    border-radius:50%;
    border:2px solid var(--line);
    border-top-color:var(--accent);
    animation:spin 0.8s linear infinite;
    flex-shrink:0;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .field{margin-bottom:14px;}
  .field label{
    display:block;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:.08em;
    color:var(--muted);
    font-weight:700;
    margin-bottom:6px;
  }
  .field input{
    width:100%;
    border:1px solid var(--line);
    border-radius:10px;
    padding:11px 12px;
    font-size:16px;
    background:var(--paper);
    color:var(--ink);
    font-family:inherit;
  }
  .field input:focus{outline:none;border-color:var(--accent);}
  .section-title{
    font-size:13px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:.08em;
    color:var(--ink);
    margin:0 0 14px;
  }
  .hidden{display:none !important;}
  .stack{display:flex;flex-direction:column;gap:10px;}
  .error-banner{
    background:#fff0ed;
    border:1px solid #f5c4b8;
    color:#a83210;
    border-radius:10px;
    padding:10px 14px;
    font-size:13px;
    line-height:1.5;
    margin-bottom:14px;
  }
  .status-ok{
    display:flex;
    align-items:center;
    gap:8px;
    background:#eef6f0;
    border:1px solid #c3dfc9;
    color:var(--ok);
    border-radius:10px;
    padding:11px 14px;
    font-size:14px;
    font-weight:600;
    margin-bottom:12px;
  }
  .status-checking{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:13px;
    color:var(--muted);
    padding:8px 0;
    margin-bottom:8px;
  }
  details summary{font-size:12px;color:var(--muted);cursor:pointer;margin-top:6px;}
  .raw-text{
    font-size:11px;color:var(--muted);background:var(--paper);
    border:1px solid var(--line);border-radius:10px;padding:10px;
    max-height:90px;overflow:auto;white-space:pre-wrap;
    font-family:ui-monospace,monospace;margin-top:8px;
  }

  /* --- Duplicaat popup --- */
  #dupOverlay{
    display:none;position:fixed;inset:0;
    background:rgba(0,0,0,.5);z-index:1000;
    overflow-y:auto;padding:20px;
  }
  #dupOverlay .dup-card{
    background:#fff;border-radius:16px;
    max-width:560px;margin:0 auto;padding:24px;
  }
</style>
</head>
<body>

<!-- PIN Overlay -->
<div class="pin-overlay" id="pinOverlay">
  <img src="Afbeelding1.png" alt="Laagland" style="height:72px;width:auto;margin-bottom:16px;">
  <div class="pin-logo">ScanCard</div>
  <p class="pin-tagline">Scan visitekaartjes. Direct opgeslagen.</p>
  <div class="pin-card">
    <label for="pinInput">Pincode</label>
    <input id="pinInput" type="password" placeholder="••••" autocomplete="off" inputmode="numeric" maxlength="20">
    <p class="pin-error" id="pinError"></p>
    <div class="save-pin-row">
      <input type="checkbox" id="savePinCheck" checked>
      <label for="savePinCheck">Onthoud pincode op dit apparaat</label>
    </div>
    <button class="btn btn-primary" id="pinSubmit">Ontgrendelen</button>
  </div>
</div>

<header>
  <div>
    <div class="header-brand">ScanCard</div>
    <div class="header-sub">Visitekaartje → Contact</div>
  </div>
  <button class="lock-btn" id="lockBtn">Uitloggen</button>
</header>

<main>

  <!-- Scan zone -->
  <div class="panel" id="captureCard">
    <label class="capture-zone" for="cardInput">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
        <path d="M4 7h3l1.4-2h7.2L17 7h3a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V8a1 1 0 0 1 1-1z"/>
        <circle cx="12" cy="13" r="3.4"/>
      </svg>
      <strong>Scan visitekaartje</strong>
      <p>Tik om de camera te openen. Leg het kaartje plat in goed licht.</p>
    </label>
    <input id="cardInput" type="file" accept="image/*" capture="environment">
  </div>

  <!-- Verwerking -->
  <div class="panel hidden" id="processingPanel">
    <img id="previewImg" class="preview-img" alt="Gescand visitekaartje">
    <div class="status">
      <span class="spinner" id="procSpinner"></span>
      <span id="statusText">Bezig met herkennen…</span>
    </div>
    <div class="error-banner hidden" id="errorBanner"></div>
    <div class="hidden" id="retryWrap" style="margin-top:8px">
      <button class="btn btn-secondary" id="retryBtn">Opnieuw proberen</button>
    </div>
  </div>

  <!-- Herkende gegevens -->
  <div class="panel hidden" id="resultPanel">
    <p class="section-title">Herkende gegevens</p>
    <div class="stack">
      <div class="field"><label for="f-name">Naam</label><input id="f-name" type="text" placeholder="Voornaam Achternaam"></div>
      <div class="field"><label for="f-org">Bedrijf</label><input id="f-org" type="text" placeholder="Bedrijfsnaam"></div>
      <div class="field"><label for="f-title">Functie</label><input id="f-title" type="text" placeholder="Functietitel"></div>
      <div class="field"><label for="f-phone">Telefoon</label><input id="f-phone" type="tel" placeholder="+31 6 12345678"></div>
      <div class="field"><label for="f-email">E-mail</label><input id="f-email" type="email" placeholder="naam@bedrijf.nl"></div>
      <div class="field"><label for="f-website">Website</label><input id="f-website" type="text" placeholder="www.bedrijf.nl"></div>
    </div>
    <details>
      <summary>Ruwe AI-respons</summary>
      <div class="raw-text" id="rawText"></div>
    </details>
  </div>

  <!-- Opslaan status + acties -->
  <div class="panel hidden" id="actionPanel">
    <div id="saveStatusWrap"></div>
    <div class="stack">
      <button class="btn btn-primary hidden" id="addContactBtn">Voeg toe aan Contacten</button>
      <button class="btn btn-secondary hidden" id="retrySaveBtn">Opnieuw opslaan</button>
      <button class="btn btn-secondary" id="rescanBtn">Nieuwe scan</button>
    </div>
  </div>

</main>

<div class="page-logo">
  <img src="Afbeelding1.png" alt="Laagland Machines Tools & Service">
</div>

<!-- Duplicaat popup -->
<div id="dupOverlay">
  <div class="dup-card">
    <p style="font-weight:700;font-size:17px;margin:0 0 4px;">Mogelijk duplicaat gevonden</p>
    <p style="color:#7a7367;font-size:14px;margin:0 0 20px;">Controleer welk contact je wilt bewaren.</p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <div>
        <p style="font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:#7a7367;margin:0 0 8px;">Bestaand in database</p>
        <div id="dupExisting" style="background:#f5f5f5;border-radius:10px;padding:14px;font-size:13px;line-height:1.8;"></div>
      </div>
      <div>
        <p style="font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:#7a7367;margin:0 0 8px;">Nieuw gescand</p>
        <div id="dupNew" style="background:#eef6f0;border-radius:10px;padding:14px;font-size:13px;line-height:1.8;"></div>
      </div>
    </div>
    <div style="display:grid;gap:8px;margin-top:16px;">
      <button class="btn btn-primary" id="dupKeepNew">Gebruik nieuw — vervang bestaand</button>
      <button class="btn btn-secondary" id="dupKeepBoth">Sla beide op</button>
      <button class="btn btn-secondary" id="dupKeepOld" style="color:#a83210;">Behoud bestaand — gooi nieuw weg</button>
    </div>
  </div>
</div>

<script>
const WORKER_URL  = 'https://autumn-sun-7aa9.oualidsajri.workers.dev';
const STORAGE_KEY = 'vc_scanner_apikey';

// --- Elementen ---
const cardInput       = document.getElementById('cardInput');
const captureCard     = document.getElementById('captureCard');
const processingPanel = document.getElementById('processingPanel');
const previewImg      = document.getElementById('previewImg');
const statusText      = document.getElementById('statusText');
const errorBanner     = document.getElementById('errorBanner');
const retryWrap       = document.getElementById('retryWrap');
const resultPanel     = document.getElementById('resultPanel');
const actionPanel     = document.getElementById('actionPanel');
const rawText         = document.getElementById('rawText');
const rescanBtn       = document.getElementById('rescanBtn');
const addContactBtn   = document.getElementById('addContactBtn');
const retrySaveBtn    = document.getElementById('retrySaveBtn');
const saveStatusWrap  = document.getElementById('saveStatusWrap');

const fields = {
  name:    document.getElementById('f-name'),
  org:     document.getElementById('f-org'),
  title:   document.getElementById('f-title'),
  phone:   document.getElementById('f-phone'),
  email:   document.getElementById('f-email'),
  website: document.getElementById('f-website'),
};

// --- PIN ---
let currentPin = '';

(function initPin() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    currentPin = saved;
  } else {
    document.getElementById('pinOverlay').classList.add('visible');
    setTimeout(() => document.getElementById('pinInput').focus(), 100);
  }
})();

function submitPin() {
  const pin = document.getElementById('pinInput').value.trim();
  const err = document.getElementById('pinError');
  if (!pin) { err.textContent = 'Voer een pincode in.'; return; }
  currentPin = pin;
  err.textContent = '';
  if (document.getElementById('savePinCheck').checked) {
    try { localStorage.setItem(STORAGE_KEY, pin); } catch(e) {}
  }
  document.getElementById('pinOverlay').classList.remove('visible');
}

document.getElementById('pinSubmit').addEventListener('click', submitPin);
document.getElementById('pinInput').addEventListener('keydown', e => { if (e.key === 'Enter') submitPin(); });

document.getElementById('lockBtn').addEventListener('click', () => {
  currentPin = '';
  try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
  document.getElementById('pinInput').value = '';
  document.getElementById('pinOverlay').classList.add('visible');
  setTimeout(() => document.getElementById('pinInput').focus(), 100);
});

// --- Foto gekozen ---
let lastFile = null;

cardInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  lastFile = file;

  previewImg.src = URL.createObjectURL(file);
  captureCard.classList.add('hidden');
  processingPanel.classList.remove('hidden');
  resultPanel.classList.add('hidden');
  actionPanel.classList.add('hidden');
  showError('');
  retryWrap.classList.add('hidden');
  saveStatusWrap.innerHTML = '';
  addContactBtn.classList.add('hidden');
  retrySaveBtn.classList.add('hidden');

  analyzeCard(file);
});

document.getElementById('retryBtn').addEventListener('click', () => {
  if (lastFile) { showError(''); retryWrap.classList.add('hidden'); analyzeCard(lastFile); }
});

// --- Afbeelding crop & warp ---
function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const objUrl = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(objUrl);
      try { resolve(cropAndWarpCard(img)); }
      catch(e) { resolve(fallbackFull(img)); }
    };
    img.onerror = reject;
    img.src = objUrl;
  });
}

function fallbackFull(img) {
  const fc = document.createElement('canvas');
  fc.width = img.width; fc.height = img.height;
  fc.getContext('2d').drawImage(img, 0, 0);
  return fc.toDataURL('image/jpeg', 0.97).split(',')[1];
}

function cropAndWarpCard(img) {
  const PROC = 800;
  const scale = Math.min(1, PROC / Math.max(img.width, img.height));
  const pw = Math.round(img.width * scale), ph = Math.round(img.height * scale);

  const pc = document.createElement('canvas');
  pc.width = pw; pc.height = ph;
  pc.getContext('2d').drawImage(img, 0, 0, pw, ph);
  const px = pc.getContext('2d').getImageData(0, 0, pw, ph).data;

  const gray = new Uint8ClampedArray(pw * ph);
  for (let i = 0; i < pw * ph; i++)
    gray[i] = (77 * px[i*4] + 150 * px[i*4+1] + 29 * px[i*4+2]) >> 8;

  const K5 = [1,4,6,4,1, 4,16,24,16,4, 6,24,36,24,6, 4,16,24,16,4, 1,4,6,4,1];
  const blurred = new Uint8ClampedArray(pw * ph);
  for (let y = 2; y < ph-2; y++)
    for (let x = 2; x < pw-2; x++) {
      let s = 0;
      for (let dy = -2; dy <= 2; dy++)
        for (let dx = -2; dx <= 2; dx++)
          s += gray[(y+dy)*pw+(x+dx)] * K5[(dy+2)*5+(dx+2)];
      blurred[y*pw+x] = s >> 8;
    }

  const Kx = [-1,0,1,-2,0,2,-1,0,1], Ky = [-1,-2,-1,0,0,0,1,2,1];
  const edges = new Uint8ClampedArray(pw * ph);
  for (let y = 1; y < ph-1; y++)
    for (let x = 1; x < pw-1; x++) {
      let gx = 0, gy = 0;
      for (let dy = -1; dy <= 1; dy++)
        for (let dx = -1; dx <= 1; dx++) {
          const p = blurred[(y+dy)*pw+(x+dx)], ki = (dy+1)*3+(dx+1);
          gx += p*Kx[ki]; gy += p*Ky[ki];
        }
      edges[y*pw+x] = Math.min(255, Math.sqrt(gx*gx + gy*gy));
    }

  const diag = Math.ceil(Math.sqrt(pw*pw + ph*ph));
  const NR = diag*2, NT = 180;
  const accum = new Int32Array(NT * NR);
  const cosT = new Float32Array(NT), sinT = new Float32Array(NT);
  for (let t = 0; t < NT; t++) {
    cosT[t] = Math.cos(t * Math.PI / NT);
    sinT[t] = Math.sin(t * Math.PI / NT);
  }
  for (let y = 0; y < ph; y++)
    for (let x = 0; x < pw; x++) {
      if (edges[y*pw+x] < 80) continue;
      for (let t = 0; t < NT; t++) {
        const r = Math.round(x*cosT[t] + y*sinT[t]) + diag;
        if (r >= 0 && r < NR) accum[t*NR+r]++;
      }
    }

  const minV = Math.max(25, Math.min(pw, ph) * 0.12);
  const peaks = [];
  for (let t = 0; t < NT; t++)
    for (let r = 3; r < NR-3; r++) {
      const v = accum[t*NR+r];
      if (v < minV) continue;
      let ok = true;
      outer: for (let dt = -5; dt <= 5; dt++)
        for (let dr = -3; dr <= 3; dr++) {
          if (!dt && !dr) continue;
          if (accum[((t+dt+NT)%NT)*NR+(r+dr)] > v) { ok = false; break outer; }
        }
      if (ok) peaks.push({theta: t*Math.PI/NT, r: r-diag, v});
    }
  peaks.sort((a,b) => b.v - a.v);

  const horiz = peaks.filter(l => { const d = l.theta*180/Math.PI; return d >= 60 && d <= 120; });
  const vert  = peaks.filter(l => { const d = l.theta*180/Math.PI; return d < 30 || d > 150; });

  function pick2(lines, minSep) {
    const out = [];
    for (const l of lines) {
      if (!out.length) { out.push(l); continue; }
      if (out.length === 1 && Math.abs(l.r - out[0].r) >= minSep) { out.push(l); break; }
    }
    return out.length === 2 ? out : null;
  }

  const h2 = pick2(horiz, ph * 0.2);
  const v2  = pick2(vert,  pw * 0.2);
  if (!h2 || !v2) return fallbackFull(img);

  function intersect(l1, l2) {
    const det = Math.cos(l1.theta)*Math.sin(l2.theta) - Math.cos(l2.theta)*Math.sin(l1.theta);
    if (Math.abs(det) < 0.01) return null;
    return {
      x: (l1.r*Math.sin(l2.theta) - l2.r*Math.sin(l1.theta)) / det,
      y: (l2.r*Math.cos(l1.theta) - l1.r*Math.cos(l2.theta)) / det,
    };
  }
  const corners = [];
  for (const hl of h2) for (const vl of v2) { const pt = intersect(hl, vl); if (pt) corners.push(pt); }
  if (corners.length !== 4) return fallbackFull(img);

  const xs = corners.map(p=>p.x), ys = corners.map(p=>p.y);
  const qw = Math.max(...xs)-Math.min(...xs), qh = Math.max(...ys)-Math.min(...ys);
  if (qw < pw*0.15 || qh < ph*0.15 || qw > pw*0.98 || qh > ph*0.98) return fallbackFull(img);

  const src = corners.map(p => [p.x/scale, p.y/scale]);
  const sums = src.map(p=>p[0]+p[1]), diffs = src.map(p=>p[0]-p[1]);
  const tl = src[sums.indexOf(Math.min(...sums))];
  const br = src[sums.indexOf(Math.max(...sums))];
  const tr = src[diffs.indexOf(Math.max(...diffs))];
  const bl = src[diffs.indexOf(Math.min(...diffs))];
  const ord = [tl, tr, br, bl];

  function d2(a,b) { return Math.sqrt((a[0]-b[0])**2+(a[1]-b[1])**2); }
  const dstW = Math.round(Math.max(d2(ord[0],ord[1]), d2(ord[3],ord[2])));
  const dstH = Math.round(Math.max(d2(ord[0],ord[3]), d2(ord[1],ord[2])));

  const dstPts = [[0,0],[dstW-1,0],[dstW-1,dstH-1],[0,dstH-1]];
  const A = [];
  for (let i = 0; i < 4; i++) {
    const [x,y] = ord[i], [xp,yp] = dstPts[i];
    A.push([-x,-y,-1,0,0,0,xp*x,xp*y,xp]);
    A.push([0,0,0,-x,-y,-1,yp*x,yp*y,yp]);
  }
  const bv = A.map(r=>-r[8]);
  const mv = A.map(r=>r.slice(0,8));
  const aug = mv.map((r,i)=>[...r, bv[i]]);
  for (let c = 0; c < 8; c++) {
    let mx = c;
    for (let r = c+1; r < 8; r++) if (Math.abs(aug[r][c])>Math.abs(aug[mx][c])) mx=r;
    [aug[c],aug[mx]] = [aug[mx],aug[c]];
    if (Math.abs(aug[c][c])<1e-12) continue;
    for (let r = 0; r < 8; r++) {
      if (r===c) continue;
      const f = aug[r][c]/aug[c][c];
      for (let j = c; j <= 8; j++) aug[r][j] -= f*aug[c][j];
    }
  }
  const H = [...aug.map((r,i)=>r[8]/r[i]), 1];
  const [ha,hb,hc,hd,he,hf,hg,hh,hk] = H;
  const det3 = ha*(he*hk-hf*hh)-hb*(hd*hk-hf*hg)+hc*(hd*hh-he*hg);
  const iH = [
    (he*hk-hf*hh)/det3, (hc*hh-hb*hk)/det3, (hb*hf-hc*he)/det3,
    (hf*hg-hd*hk)/det3, (ha*hk-hc*hg)/det3, (hc*hd-ha*hf)/det3,
    (hd*hh-he*hg)/det3, (hb*hg-ha*hh)/det3, (ha*he-hb*hd)/det3,
  ];

  const srcC = document.createElement('canvas');
  srcC.width = img.width; srcC.height = img.height;
  srcC.getContext('2d').drawImage(img, 0, 0);
  const sp = srcC.getContext('2d').getImageData(0, 0, img.width, img.height).data;
  const sw = img.width, sh = img.height;

  const dstC = document.createElement('canvas');
  dstC.width = dstW; dstC.height = dstH;
  const dctx = dstC.getContext('2d');
  const di = dctx.createImageData(dstW, dstH);
  const dp = di.data;

  for (let y = 0; y < dstH; y++)
    for (let x = 0; x < dstW; x++) {
      const w3 = iH[6]*x + iH[7]*y + iH[8];
      const sx = (iH[0]*x + iH[1]*y + iH[2]) / w3;
      const sy = (iH[3]*x + iH[4]*y + iH[5]) / w3;
      const ix = (y*dstW+x)*4;
      if (sx < 0 || sx > sw-1 || sy < 0 || sy > sh-1) {
        dp[ix]=dp[ix+1]=dp[ix+2]=255; dp[ix+3]=255; continue;
      }
      const x0=Math.floor(sx), y0=Math.floor(sy);
      const x1=Math.min(x0+1,sw-1), y1=Math.min(y0+1,sh-1);
      const fx=sx-x0, fy=sy-y0;
      const i00=(y0*sw+x0)*4, i10=(y0*sw+x1)*4, i01=(y1*sw+x0)*4, i11=(y1*sw+x1)*4;
      for (let ch = 0; ch < 3; ch++)
        dp[ix+ch] = Math.round(
          (1-fx)*(1-fy)*sp[i00+ch] + fx*(1-fy)*sp[i10+ch] +
          (1-fx)*fy*sp[i01+ch]     + fx*fy*sp[i11+ch]
        );
      dp[ix+3] = 255;
    }

  dctx.putImageData(di, 0, 0);
  return dstC.toDataURL('image/jpeg', 0.97).split(',')[1];
}

// --- Telefoonnummer normaliseren ---
function normalizePhone(raw) {
  if (!raw) return '';
  let n = raw.replace(/\(\s*0\s*\)/g, '');
  const hasPlus = n.trimStart().startsWith('+');
  n = n.replace(/\D/g, '');
  if (hasPlus) n = '+' + n.replace(/^0+/, '');
  return n;
}

// --- AI analyse ---
async function analyzeCard(file) {
  if (!currentPin) {
    showError('Pincode niet ingesteld. Gebruik "Uitloggen" en log opnieuw in.');
    retryWrap.classList.remove('hidden');
    return;
  }

  setStatus('Kaartje uitknippen…');

  let base64;
  try {
    base64 = await fileToBase64(file);
  } catch (e) {
    showError('Kon de foto niet inlezen: ' + e.message);
    retryWrap.classList.remove('hidden');
    return;
  }

  setStatus('Visitekaartje herkennen via AI…');

  const prompt = `Dit is een foto van een visitekaartje. Lees de tekst EXACT over zoals hij op het kaartje staat — let op spelling, hoofdletters, punten en bijzondere tekens. Gebruik NOOIT aannames of autocorrectie.

Extraheer de volgende velden en geef ze terug als JSON. Gebruik "" als een veld ontbreekt. Geef ALLEEN de JSON terug, geen uitleg of markdown.

{
  "name": "volledige naam van de persoon",
  "org": "bedrijfs- of organisatienaam",
  "title": "functietitel",
  "phone": "telefoonnummer (voorkeur: mobiel, anders vast)",
  "email": "e-mailadres",
  "website": "website URL"
}

Neem telefoonnummers over inclusief landcode als die er staat. Bij meerdere telefoonnummers kies je het mobiele nummer.`;

  let responseBody;
  try {
    const res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: {
        'x-app-pin': currentPin,
        'anthropic-version': '2023-06-01',
        'content-type': 'application/json',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 512,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: file.type || 'image/jpeg', data: base64 } },
            { type: 'text', text: prompt },
          ],
        }],
      }),
    });

    responseBody = await res.json();

    if (!res.ok) {
      if (res.status === 401) {
        showError('Ongeldige pincode. Gebruik "Uitloggen" en probeer opnieuw.');
      } else {
        showError(`API-fout ${res.status}: ${responseBody?.error?.message || res.statusText}`);
      }
      retryWrap.classList.remove('hidden');
      return;
    }
  } catch (e) {
    showError('Netwerkfout: ' + e.message);
    retryWrap.classList.remove('hidden');
    return;
  }

  const rawContent = responseBody?.content?.[0]?.text || '';
  rawText.textContent = rawContent;

  const jsonStr = rawContent.replace(/```json?\s*/gi, '').replace(/```/g, '').trim();
  let parsed;
  try {
    parsed = JSON.parse(jsonStr);
  } catch (e) {
    showError('AI gaf een onverwachte respons. Probeer opnieuw of gebruik een scherpere foto.');
    retryWrap.classList.remove('hidden');
    return;
  }

  fields.name.value    = parsed.name    || '';
  fields.org.value     = parsed.org     || '';
  fields.title.value   = parsed.title   || '';
  fields.phone.value   = normalizePhone(parsed.phone || '');
  fields.email.value   = parsed.email   || '';
  fields.website.value = parsed.website || '';

  processingPanel.classList.add('hidden');
  resultPanel.classList.remove('hidden');
  actionPanel.classList.remove('hidden');

  autoSave(getFieldValues());
}

// --- Auto-save na herkenning ---
async function autoSave(f) {
  saveStatusWrap.innerHTML = '<div class="status-checking"><span class="spinner"></span>Controleren op duplicaten…</div>';
  addContactBtn.classList.add('hidden');
  retrySaveBtn.classList.add('hidden');

  let duplicates = [];
  try {
    const res = await fetch(WORKER_URL + '/contacts/check', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-app-pin': currentPin },
      body: JSON.stringify({ name: f.name, phone: f.phone, email: f.email }),
    });
    if (res.ok) duplicates = await res.json();
  } catch {}

  if (duplicates.length > 0) {
    saveStatusWrap.innerHTML = '';
    const dup = duplicates[0];
    document.getElementById('dupExisting').innerHTML = formatContactCard(dup);
    document.getElementById('dupNew').innerHTML = formatContactCard(f);
    document.getElementById('dupOverlay').style.display = 'block';

    document.getElementById('dupKeepNew').onclick = async () => {
      closeDupPopup();
      const ok = await saveContactToDb(f, dup.id);
      showSavedState(f, ok);
    };
    document.getElementById('dupKeepBoth').onclick = async () => {
      closeDupPopup();
      const ok = await saveContactToDb(f);
      showSavedState(f, ok);
    };
    document.getElementById('dupKeepOld').onclick = () => {
      closeDupPopup();
      saveStatusWrap.innerHTML = '<div style="font-size:13px;color:var(--muted);padding:6px 0">Bestaand contact bewaard.</div>';
    };
  } else {
    const ok = await saveContactToDb(f);
    showSavedState(f, ok);
  }
}

function showSavedState(f, savedOk) {
  if (savedOk) {
    saveStatusWrap.innerHTML = '<div class="status-ok">✓ Opgeslagen in database</div>';
  } else {
    saveStatusWrap.innerHTML = '<div style="font-size:13px;color:var(--muted);padding:6px 0">Database niet bereikbaar — contact nog niet opgeslagen.</div>';
    retrySaveBtn.classList.remove('hidden');
  }
  addContactBtn.classList.remove('hidden');
  addContactBtn.onclick = () => downloadVcard(f);
}

retrySaveBtn.addEventListener('click', async () => {
  retrySaveBtn.classList.add('hidden');
  await autoSave(getFieldValues());
});

function getFieldValues() {
  return {
    name:    fields.name.value.trim(),
    org:     fields.org.value.trim(),
    title:   fields.title.value.trim(),
    phone:   fields.phone.value.trim(),
    email:   fields.email.value.trim(),
    website: fields.website.value.trim(),
  };
}

function closeDupPopup() {
  document.getElementById('dupOverlay').style.display = 'none';
}

async function saveContactToDb(f, replaceId) {
  try {
    const body = replaceId ? { ...f, replaceId } : f;
    const res = await fetch(WORKER_URL + '/contacts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-app-pin': currentPin },
      body: JSON.stringify(body),
    });
    return res.ok;
  } catch {
    return false;
  }
}

// --- vCard downloaden (vereist gebruikersactie op iOS) ---
function downloadVcard(f) {
  const nameParts = (f.name || '').split(/\s+/);
  const given  = nameParts.shift() || '';
  const family = nameParts.join(' ');
  const vcard = [
    'BEGIN:VCARD', 'VERSION:3.0',
    `N:${family};${given};;;`,
    `FN:${f.name || 'Onbekend'}`,
    f.org     ? `ORG:${f.org}`     : '',
    f.title   ? `TITLE:${f.title}` : '',
    f.phone   ? `TEL;TYPE=CELL:${f.phone}` : '',
    f.email   ? `EMAIL:${f.email}` : '',
    f.website ? `URL:${f.website.startsWith('http') ? f.website : 'https://' + f.website}` : '',
    'END:VCARD'
  ].filter(Boolean).join('\r\n');
  const blob = new Blob([vcard], { type: 'text/vcard' });
  const url  = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${(f.name || 'contact').replace(/\s+/g, '_')}.vcf`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 5000);
}

function formatContactCard(c) {
  const row = (label, val) => val ? `<span style="color:#7a7367;font-size:11px">${label}</span><br><strong>${val}</strong><br>` : '';
  return row('Naam', c.name) + row('Bedrijf', c.org) + row('Functie', c.title) +
         row('Telefoon', c.phone) + row('E-mail', c.email) + row('Website', c.website);
}

// --- Status / errors ---
function setStatus(msg) {
  statusText.textContent = msg;
  document.getElementById('procSpinner').style.display = '';
}

function showError(msg) {
  if (!msg) { errorBanner.classList.add('hidden'); errorBanner.textContent = ''; return; }
  errorBanner.textContent = msg;
  errorBanner.classList.remove('hidden');
  document.getElementById('procSpinner').style.display = 'none';
  statusText.textContent = 'Herkenning mislukt.';
}

// --- Nieuwe scan ---
rescanBtn.addEventListener('click', () => {
  captureCard.classList.remove('hidden');
  resultPanel.classList.add('hidden');
  actionPanel.classList.add('hidden');
  processingPanel.classList.add('hidden');
  cardInput.value = '';
  lastFile = null;
  Object.values(fields).forEach(f => f.value = '');
  saveStatusWrap.innerHTML = '';
  addContactBtn.classList.add('hidden');
  retrySaveBtn.classList.add('hidden');
});
</script>
